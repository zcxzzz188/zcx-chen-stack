<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>辰栈</title>
</head>
<body style="margin: 0; padding: 24px 0; background-color: #f5f7fa; font-family: 'Microsoft YaHei', sans-serif; color: #303133;">
<table style="width: 100%; border-spacing: 0;">
    <tr>
        <td align="center">
            <div style="width: 100%; max-width: 420px; background-color: #ffffff; border: 1px solid #ebeef5; border-radius: 14px; overflow: hidden; box-shadow: 0 8px 24px rgba(31, 45, 61, 0.08);">
                <div style="padding: 28px 24px 16px; text-align: center; background: linear-gradient(135deg, #ecf5ff, #f4f9ff);">
                    <div style="font-size: 30px; font-weight: 700; color: #303133;">辰栈</div>
                    <div style="margin-top: 8px; font-size: 16px; color: #606266;">重置密码验证码</div>
                </div>
                <div style="padding: 28px 24px; text-align: center;">
                    <div style="font-size: 16px; color: #606266;">您的重置密码验证码为</div>
                    <div th:text="${checkCode}" style="margin: 18px 0; font-size: 38px; font-weight: 700; letter-spacing: 6px; color: #f56c6c;"></div>
                    <div style="font-size: 15px; line-height: 1.8; color: #606266;">
                        验证码有效期为 5 分钟。<br>
                        为了您的账号安全，请勿将验证码泄露给他人。
                    </div>
                </div>
                <div style="padding: 0 24px 28px; text-align: left; font-size: 14px; line-height: 1.8; color: #909399;">
                    此邮件由辰栈系统自动发送，请勿直接回复。<br>
                    辰栈
                </div>
            </div>
        </td>
    </tr>
</table>
</body>
</html>
