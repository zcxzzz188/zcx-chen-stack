<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>绯荤粺閫氱煡</title>
</head>

<body style="margin: 0px auto;">
    <table style="min-height: 100vh; width: 100%; border-spacing: 0px">
        <td
            style="padding: 10px; background: url('https://bing.img.run/1920x1080.php') no-repeat center center / cover;">
            <div class="container" style="width: 350px; margin: 0 auto; text-align: center;">
                <div class="avatar" style=" margin-top: 5px;">
                    <span
                        style="display: inline-block; padding: 12px 18px; border-radius: 999px; background-color: rgba(255, 255, 255, 0.8); color: #333333; font-weight: bold;">辰栈</span>
                </div>
                <div class="title"
                    style="margin-top: 10px; padding-top: 10px; background-color: rgba(255, 255, 255, 0.5); border-radius: 10px 10px 0 0;">
                    <span style="font-weight: bold; font-size: 30px; color: #333333;">辰栈</span><br>
                    <span style="font-size: 20px; color: grey">AI 辅助技术博客管理系统</span>
                </div>
                <div class="content"
                    style="font-size: 18px; padding: 15px 0; background-color: rgba(255, 255, 255, 0.5); border-radius: 0 0 10px 10px ;">
                    <p style="margin: 0 0 10px 0; text-align: left; padding: 0 15px;">
                        浜茬埍鐨?<span th:text="${recipientNickname}" style="font-weight: bold;"></span>锛屾偍濂斤紒
                    </p>

                    <!-- 閫氱煡鏍囬 -->
                    <div style="margin: 15px; padding: 10px; background-color: rgba(64, 158, 255, 0.1); border-left: 4px solid #409eff; border-radius: 5px; text-align: left;">
                        <p style="margin: 0; font-weight: bold; color: #409eff;" th:text="${notificationTitle}"></p>
                    </div>

                    <!-- 閫氱煡鍐呭 -->
                    <div style="margin: 15px; padding: 15px; background-color: rgba(255, 255, 255, 0.9); border-radius: 5px; text-align: left;">
                        <p style="margin: 0; color: #333; line-height: 1.6;" th:text="${notificationContent}"></p>
                    </div>

                    <!-- 闄勫姞淇℃伅锛堝鏋滄湁锛?-->
                    <div th:if="${extraInfo != null and extraInfo != ''}"
                         style="margin: 15px; padding: 10px; background-color: rgba(255, 255, 255, 0.8); border-radius: 5px; text-align: left; font-size: 14px; color: #666;">
                        <p style="margin: 0;" th:text="${extraInfo}"></p>
                    </div>

                    <p style="margin: 15px 0 5px 0; text-align: right; padding: 0 15px; color: #999; font-size: 14px;">
                        鍙戦€佹椂闂达細<span th:text="${sendTime}"></span>
                    </p>
                </div>
                <div class="button" style="width: 300px; margin: 0px auto; ">
                    <div th:if="${linkUrl != null and linkUrl != ''}">
                        <a th:href="${linkUrl}" class="goto"
                            style="display: block; margin-top: 5px; padding: 10px; font-size: 18px; text-decoration: none; border-radius: 10px;
                       background-image: linear-gradient(to right, #409eff, #69c0ff, #00ccff, #98c0e6); background-size: 200% 100%;
                                 color: white; transition: all 0.5s ease; box-shadow: 3px 8px 10px rgba(0, 0, 0, 0.1);  ">
                            <span th:text="${linkText}">鏌ョ湅璇︽儏</span>
                        </a>
                    </div>
                    <div style="margin-top: 15px; padding: 10px; font-size: 18px; color: #333333;">
                        项目源码整理中
                    </div>
                </div>
            </div>
        </td>
    </table>
</body>

</html>
