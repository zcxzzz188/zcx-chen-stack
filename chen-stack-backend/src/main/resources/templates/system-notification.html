<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>辰栈系统通知</title>
</head>
<body style="margin: 0; padding: 24px 0; background-color: #f5f7fa; font-family: 'Microsoft YaHei', sans-serif; color: #303133;">
<table style="width: 100%; border-spacing: 0;">
    <tr>
        <td align="center">
            <div style="width: 100%; max-width: 460px; background-color: #ffffff; border: 1px solid #ebeef5; border-radius: 14px; overflow: hidden; box-shadow: 0 8px 24px rgba(31, 45, 61, 0.08);">
                <div style="padding: 28px 24px 16px; text-align: center; background: linear-gradient(135deg, #ecf5ff, #f4f9ff);">
                    <div style="font-size: 30px; font-weight: 700; color: #303133;">辰栈</div>
                    <div style="margin-top: 8px; font-size: 16px; color: #606266;">系统通知</div>
                </div>
                <div style="padding: 28px 24px; font-size: 15px; line-height: 1.9; color: #606266;">
                    <p style="margin: 0 0 16px 0;">
                        亲爱的 <span th:text="${recipientNickname}" style="font-weight: 700; color: #303133;"></span>，您好。
                    </p>
                    <div style="margin-bottom: 16px; padding: 14px 16px; background-color: #ecf5ff; border-left: 4px solid #409eff; border-radius: 8px;">
                        <div th:text="${notificationTitle}" style="font-size: 16px; font-weight: 700; color: #409eff;"></div>
                    </div>
                    <div style="padding: 16px; background-color: #f8fafc; border: 1px solid #ebeef5; border-radius: 10px; color: #303133;">
                        <span th:text="${notificationContent}"></span>
                    </div>
                    <div th:if="${extraInfo != null and extraInfo != ''}"
                         style="margin-top: 16px; padding: 14px 16px; background-color: #fafafa; border-radius: 10px; color: #606266;">
                        <span th:text="${extraInfo}"></span>
                    </div>
                    <div style="margin-top: 18px;">
                        如需进一步查看，请登录辰栈查看系统通知或相关页面。
                    </div>
                    <div style="margin-top: 18px; font-size: 13px; color: #909399;">
                        发送时间：<span th:text="${sendTime}"></span>
                    </div>
                </div>
                <div style="padding: 0 24px 28px; text-align: left; font-size: 14px; line-height: 1.8; color: #909399;">
                    此邮件由辰栈系统自动发送，请勿直接回复。<br>
                    辰栈
                </div>
            </div>
        </td>
    </tr>
</table>
</body>
</html>
