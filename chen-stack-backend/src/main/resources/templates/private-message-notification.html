<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>辰栈私信通知</title>
</head>
<body style="margin: 0; padding: 24px 0; background-color: #f5f7fa; font-family: 'Microsoft YaHei', sans-serif; color: #303133;">
<table style="width: 100%; border-spacing: 0;">
    <tr>
        <td align="center">
            <div style="width: 100%; max-width: 460px; background-color: #ffffff; border: 1px solid #ebeef5; border-radius: 14px; overflow: hidden; box-shadow: 0 8px 24px rgba(31, 45, 61, 0.08);">
                <div style="padding: 28px 24px 16px; text-align: center; background: linear-gradient(135deg, #ecf5ff, #f4f9ff);">
                    <div style="font-size: 30px; font-weight: 700; color: #303133;">辰栈</div>
                    <div style="margin-top: 8px; font-size: 16px; color: #606266;">私信通知</div>
                </div>
                <div style="padding: 28px 24px; font-size: 15px; line-height: 1.9; color: #606266;">
                    <p style="margin: 0 0 16px 0;">
                        您收到了一条新的私信消息。
                    </p>
                    <div style="padding: 16px; background-color: #f8fafc; border: 1px solid #ebeef5; border-radius: 10px; text-align: left;">
                        <p style="margin: 0 0 12px 0;">
                            <span style="font-weight: 700; color: #303133;">发送者：</span>
                            <span th:text="${senderNickname}" style="color: #303133;">未知用户</span>
                        </p>
                        <p style="margin: 0 0 12px 0;">
                            <span style="font-weight: 700; color: #303133;">消息内容：</span><br>
                            <span th:text="${messagePreview}" style="display: block; margin-top: 8px; color: #606266;">消息预览</span>
                        </p>
                        <p style="margin: 0;">
                            <span style="font-weight: 700; color: #303133;">接收时间：</span>
                            <span th:text="${#dates.format(receiveTime, 'yyyy-MM-dd HH:mm:ss')}" style="color: #606266;">未知时间</span>
                        </p>
                    </div>
                    <div style="margin-top: 18px;">
                        请登录辰栈查看并回复私信。
                    </div>
                </div>
                <div style="padding: 0 24px 28px; text-align: left; font-size: 14px; line-height: 1.8; color: #909399;">
                    此邮件由辰栈系统自动发送，请勿直接回复。<br>
                    辰栈
                </div>
            </div>
        </td>
    </tr>
</table>
</body>
</html>
