<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>辰栈</title>
</head>
<body style="margin: 0px auto;">
<table style="min-height: 100vh; width: 100%; border-spacing: 0px">
    <td style="padding: 10px; background: url('https://bing.img.run/1920x1080.php') no-repeat center center / cover;">
        <div class="container" style="width: 400px; margin: 0 auto; text-align: center;">
            <div class="title" style="margin-top: 10px; padding-top: 10px; background-color: rgba(255, 255, 255, 0.5); border-radius: 10px 10px 0 0;">
                <span style="font-weight: bold; font-size: 30px; color: #333333;">您收到了一条新私信</span><br>
            </div>
            <div class="message-content" style="font-size: 18px; padding: 20px 0; background-color: rgba(255, 255, 255, 0.5);">
                <p style="margin: 10px 0;">
                    <span style="color: #666;">发送者：</span>
                    <span th:text="${senderNickname}" style="font-weight: bold; color: #333;">未知用户</span>
                </p>
                <p style="margin: 10px 0; text-align: left; padding: 0 20px;">
                    <span style="color: #666;">消息内容：</span><br>
                    <span th:text="${messagePreview}" style="color: #444; background-color: rgba(255,255,255,0.6); padding: 10px; border-radius: 5px; display: block; margin-top: 5px;">消息预览</span>
                </p>
                <p style="margin: 10px 0;">
                    <span style="color: #666;">接收时间：</span>
                    <span th:text="${#dates.format(receiveTime, 'yyyy-MM-dd HH:mm:ss')}" style="color: #333;">未知时间</span>
                </p>
            </div>
            <div class="content" style="font-size: 16px; padding: 10px; background-color: rgba(255, 255, 255, 0.5);">
                这是辰栈的系统自动通知邮件，请勿直接回复。点击下面的按钮即可查看并回复私信。
            </div>
            <div class="button" style="width: 300px; margin: 0px auto;">
                <div>
                    <a th:href="${conversationUrl}" class="goto"
                       style="display: block; margin-top: 5px; margin-bottom: 5px; padding: 10px; font-size: 20px; text-decoration: none; border-radius: 10px;
                       background-image: linear-gradient(to right, #409eff, #69c0ff, #00ccff, #98c0e6); background-size: 200% 100%;
                                 color: white; transition: all 0.5s ease; box-shadow: 3px 8px 10px rgba(0, 0, 0, 0.1);">
                        查看私信
                    </a>
                </div>
                <div>
                    <span style="display: block; margin-top: 5px; padding: 10px; font-size: 20px; border-radius: 10px;
                       background-image: linear-gradient(to right, #409eff, #69c0ff, #00ccff, #98c0e6); background-size: 200% 100%;
                                 color: white; transition: all 0.5s ease; box-shadow: 3px 8px 10px rgba(0, 0, 0, 0.1);">
                        项目源码整理中
                    </span>
                </div>
            </div>
        </div>
    </td>
</table>
</body>
</html>
