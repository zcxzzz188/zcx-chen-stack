<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>辰栈黑名单通知</title>
</head>
<body style="margin: 0; padding: 24px 0; background-color: #f5f7fa; font-family: 'Microsoft YaHei', sans-serif; color: #303133;">
<table style="width: 100%; border-spacing: 0;">
    <tr>
        <td align="center">
            <div style="width: 100%; max-width: 520px; background-color: #ffffff; border: 1px solid #ebeef5; border-radius: 14px; overflow: hidden; box-shadow: 0 8px 24px rgba(31, 45, 61, 0.08);">
                <div style="padding: 28px 24px 16px; text-align: center; background: linear-gradient(135deg, #fff2f0, #fff8f7);">
                    <div style="font-size: 30px; font-weight: 700; color: #303133;">辰栈</div>
                    <div style="margin-top: 8px; font-size: 16px; color: #606266;">黑名单通知</div>
                </div>
                <div style="padding: 28px 24px; font-size: 15px; line-height: 1.9; color: #606266; text-align: left;">
                    <div style="margin-bottom: 16px; padding: 14px 16px; background-color: #fef0f0; border-left: 4px solid #f56c6c; border-radius: 8px; color: #f56c6c; font-weight: 700;">
                        黑名单拉黑通知
                    </div>
                    <div style="margin-bottom: 10px;">
                        <span style="font-weight: 700; color: #303133;">用户 ID：</span><span th:text="${userId}">N/A</span>
                    </div>
                    <div style="margin-bottom: 10px;">
                        <span style="font-weight: 700; color: #303133;">IP 地址：</span><span th:text="${ip}">N/A</span>
                    </div>
                    <div style="margin-bottom: 10px;">
                        <span style="font-weight: 700; color: #303133;">所在地址：</span><span th:text="${address}">N/A</span>
                    </div>
                    <div style="margin-bottom: 10px;">
                        <span style="font-weight: 700; color: #303133;">拉黑原因：</span><span th:text="${reason}" style="color: #e6a23c;">未知原因</span>
                    </div>
                    <div style="margin-bottom: 10px;">
                        <span style="font-weight: 700; color: #303133;">封禁时长：</span><span th:text="${banDuration}" style="color: #f56c6c;">未知</span>
                    </div>
                    <div style="margin-bottom: 10px;">
                        <span style="font-weight: 700; color: #303133;">拉黑时间：</span><span th:text="${banTime}">N/A</span>
                    </div>
                    <div style="margin-top: 16px; padding: 14px 16px; background-color: #fdf6ec; border-left: 4px solid #e6a23c; border-radius: 8px;">
                        该用户或 IP 已被系统自动加入黑名单，请登录管理端尽快处理。
                    </div>
                </div>
                <div style="padding: 0 24px 28px; text-align: left; font-size: 14px; line-height: 1.8; color: #909399;">
                    此邮件由辰栈系统自动发送，请勿直接回复。<br>
                    辰栈
                </div>
            </div>
        </td>
    </tr>
</table>
</body>
</html>
