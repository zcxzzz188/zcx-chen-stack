<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>辰栈</title>
</head>
<body style="margin: 0px auto;">
<table style="min-height: 100vh; width: 100%; border-spacing: 0px">
    <td style="padding: 10px; background: url('https://bing.img.run/1920x1080.php') no-repeat center center / cover;">
        <div class="container" style="width: 350px; margin: 0 auto; text-align: center;">
            <div class="title" style="margin-top: 10px; padding-top: 10px; background-color: rgba(255, 255, 255, 0.5); border-radius: 10px 10px 0 0;">
                <span style="font-weight: bold; font-size: 30px; color: #333333;">欢迎访问辰栈</span><br>
                <span style="font-size: 20px; color: grey">AI 辅助技术博客管理系统</span>
            </div>
            <div class="checkCode" style="font-size: 20px;padding-top: 10px; background-color: rgba(255, 255, 255, 0.5);">
                您的<span style="font-weight: bold">重置邮箱</span>验证码为：                <br>
                <span th:text="${checkCode}" class="code"
                      style="font-size: 35px; color: #da1717; text-shadow: 1px 2px 2px rgba(0, 0, 0, 0.3);"></span>
            </div>
            <div class="content" style="font-size: 20px; padding: 10px 0; background-color: rgba(255, 255, 255, 0.5); border-radius: 0 0 10px 10px ;">
                验证码有效期为5分钟，为了您的账号安全，请勿将验证码泄露给他人            </div>
            <div class="button" style="width: 300px; margin: 0px auto; ">
                <div>
                    <a th:href="${frontendUserHost}" class="goto"
                       style="display: block; margin-top: 5px; padding: 10px; font-size: 20px; text-decoration: none; border-radius: 10px;
                       background-image: linear-gradient(to right, #409eff, #69c0ff, #00ccff, #98c0e6); background-size: 200% 100%;
                                 color: white; transition: all 0.5s ease; box-shadow: 3px 8px 10px rgba(0, 0, 0, 0.1);  ">
                        立即前往辰栈
                    </a>
                </div>
                <div>
                    <span style="display: block; margin-top: 15px; padding: 10px; font-size: 20px; border-radius: 10px;
                       background-image: linear-gradient(to right, #409eff, #69c0ff, #00ccff, #98c0e6); background-size: 200% 100%;
                                 color: white; transition: all 0.5s ease; box-shadow: 3px 8px 10px rgba(0, 0, 0, 0.1);  ">
                        项目源码整理中
                    </span>
                </div>
                <div>
                    <span style="display: block; margin-top: 5px; padding: 10px; font-size: 20px; border-radius: 10px;
                       background-image: linear-gradient(to right, #409eff, #69c0ff, #00ccff, #98c0e6); background-size: 200% 100%;
                                 color: white; transition: all 0.5s ease; box-shadow: 3px 8px 10px rgba(0, 0, 0, 0.1);  ">
                        项目源码整理中
                    </span>
                </div>
            </div>
        </div>
    </td>
</table>
</body>
</html>
