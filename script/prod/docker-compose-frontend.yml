# 前端服务配置（管理端 + 用户端 + Nginx）
services:
  # Nginx 网关容器
  nginx-gateway:
    image: nginx:alpine
    container_name: chen-stack-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-ssl.conf:/etc/nginx/conf.d/default.conf
      - /etc/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend-admin
      - frontend-user
    networks:
      - chen-stack-network

  # 前端管理端
  frontend-admin:
    build:
      context: ${PROJECT_ROOT}/chen-stack-frontend/chen-stack-admin
      dockerfile: Dockerfile
    image: chen-stack-admin
    container_name: chen-stack-admin
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT}:80"
    networks:
      - chen-stack-network

  # 前端用户端
  frontend-user:
    build:
      context: ${PROJECT_ROOT}/chen-stack-frontend/chen-stack-user
      dockerfile: Dockerfile
    image: chen-stack-user
    container_name: chen-stack-user
    restart: unless-stopped
    ports:
      - "${USER_PORT}:80"
    networks:
      - chen-stack-network

# 网络
networks:
  chen-stack-network:
    driver: bridge
    name: chen-stack-network
